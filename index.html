<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContactKitwarit</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background-color: #020205; 
            overflow-x: hidden;
            perspective: 1000px;
        }

        .stars-bg {
            background-image: 
                radial-gradient(1px 1px at 20px 30px, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 40px 70px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 90px 110px, rgba(255,255,255,0.8), rgba(0,0,0,0)),
                radial-gradient(1px 1px at 150px 200px, #fff, rgba(0,0,0,0));
            background-size: 200px 200px;
        }
        
        .cosmic-card {
            background: rgba(8, 8, 24, 0.6);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(147, 51, 234, 0.2);
            box-shadow: 0 0 40px rgba(147, 51, 234, 0.15);
            transition: transform 0.1s ease;
            transform-style: preserve-3d;
        }

        .space-btn {
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
            transform: translateZ(20px);
        }
        .space-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
            transition: 0.5s;
        }
        .space-btn:hover::before { left: 100%; }
        .space-btn:hover {
            transform: translateZ(30px) translateY(-4px) scale(1.02);
            border-color: rgba(6, 182, 212, 0.4);
            box-shadow: 0 0 25px rgba(6, 182, 212, 0.2);
            cursor: pointer;
        }

        @keyframes cosmicDrift {
            0%, 100% { transform: translate(0px, 0px) scale(1); filter: blur(120px) saturate(1); }
            50% { transform: translate(40px, -30px) scale(1.2); filter: blur(140px) saturate(1.5); }
        }
        .nebula { animation: cosmicDrift 10s infinite ease-in-out; }

        @keyframes customFadeUp {
            from { opacity: 0; transform: translateY(30px) translateZ(0); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0) translateZ(0); filter: blur(0); }
        }
        .animate-cosmic { animation: customFadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        .d-1 { animation-delay: 0.1s; } .d-2 { animation-delay: 0.2s; }
        .d-3 { animation-delay: 0.3s; } .d-4 { animation-delay: 0.4s; }
        .d-5 { animation-delay: 0.5s; } .d-6 { animation-delay: 0.6s; }
        .d-7 { animation-delay: 0.7s; }

        #toast {
            position: fixed;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(147, 51, 234, 0.8);
            border: 1px solid rgba(192, 132, 252, 0.5);
            box-shadow: 0 0 20px rgba(147, 51, 234, 0.5);
            backdrop-filter: blur(10px);
            color: white;
            padding: 12px 24px;
            border-radius: 999px;
            font-size: 14px;
            font-weight: 400;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            opacity: 0;
            z-index: 50;
            pointer-events: none;
        }
        #toast.show {
            bottom: 40px;
            opacity: 1;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 relative overflow-hidden stars-bg">

    <div class="nebula absolute top-[-20%] left-[-10%] w-[60vw] h-[60vw] rounded-full bg-gradient-to-br from-purple-900/40 via-fuchsia-800/20 to-transparent pointer-events-none"></div>
    <div class="nebula absolute bottom-[-20%] right-[-10%] w-[60vw] h-[60vw] rounded-full bg-gradient-to-tr from-cyan-900/40 via-indigo-950/30 to-transparent pointer-events-none" style="animation-delay: -5s;"></div>

    <div id="card" class="cosmic-card w-full max-w-md rounded-[2.5rem] p-8 text-center text-white relative z-10">
        
        <div class="animate-cosmic">
            <h1 class="text-3xl font-semibold tracking-widest mb-8 bg-gradient-to-r from-cyan-200 via-white to-purple-300 bg-clip-text text-transparent drop-shadow-[0_0_15px_rgba(147,51,234,0.3)]">
                Peak Kitwarit Lawaritbut
            </h1>
        </div>

        <div class="space-y-4">
            
            <!-- Instagram -->
            <a href="https://instagram.com/Peakkit" target="_blank" class="space-btn animate-cosmic d-1 flex items-center justify-between p-4 bg-purple-950/10 border border-purple-500/10 rounded-2xl group">
                <div class="flex items-center space-x-4">
                    <div class="w-11 h-11 rounded-xl bg-gradient-to-tr from-purple-600 to-pink-500 flex items-center justify-center text-white shadow-[0_0_15px_rgba(236,72,153,0.3)]">
                        <i class="fa-brands fa-instagram text-xl"></i>
                    </div>
                    <div class="text-left">
                        <p class="text-[10px] text-cyan-400 uppercase tracking-widest font-medium">IG</p>
                        <p class="text-sm font-medium text-gray-200 mt-0.5">@Peakkit</p>
                    </div>
                </div>
                <i class="fa-solid fa-satellite text-gray-600 group-hover:text-cyan-400 text-sm transition-colors"></i>
            </a>

            <!-- TikTok -->
            <a href="https://tiktok.com/@Peakkitwarit" target="_blank" class="space-btn animate-cosmic d-2 flex items-center justify-between p-4 bg-purple-950/10 border border-purple-500/10 rounded-2xl group">
                <div class="flex items-center space-x-4">
                    <div class="w-11 h-11 rounded-xl bg-zinc-900 border border-zinc-700 flex items-center justify-center text-white">
                        <i class="fa-brands fa-tiktok text-base"></i>
                    </div>
                    <div class="text-left">
                        <p class="text-[10px] text-cyan-400 uppercase tracking-widest font-medium">TikTok</p>
                        <p class="text-sm font-medium text-gray-200 mt-0.5">@Peakkitwarit</p>
                    </div>
                </div>
                <i class="fa-solid fa-satellite text-gray-600 group-hover:text-cyan-400 text-sm transition-colors"></i>
            </a>

            <!-- Line -->
            <a href="https://line.me/ti/p/~peak_kitwarit" target="_blank" class="space-btn animate-cosmic d-3 flex items-center justify-between p-4 bg-purple-950/10 border border-purple-500/10 rounded-2xl group">
                <div class="flex items-center space-x-4">
                    <div class="w-11 h-11 rounded-xl bg-[#06C755] flex items-center justify-center text-white shadow-[0_0_15px_rgba(6,199,85,0.2)]">
                        <i class="fa-brands fa-line text-xl"></i>
                    </div>
                    <div class="text-left">
                        <p class="text-[10px] text-cyan-400 uppercase tracking-widest font-medium">Line ID</p>
                        <p class="text-sm font-medium text-gray-200 mt-0.5">peak_kitwarit</p>
                    </div>
                </div>
                <i class="fa-solid fa-satellite text-gray-600 group-hover:text-cyan-400 text-sm transition-colors"></i>
            </a>

            <!-- Facebook -->
            <a href="https://facebook.com/search/top/?q=Peak%20Kitwarit" target="_blank" class="space-btn animate-cosmic d-4 flex items-center justify-between p-4 bg-purple-950/10 border border-purple-500/10 rounded-2xl group">
                <div class="flex items-center space-x-4">
                    <div class="w-11 h-11 rounded-xl bg-[#1877F2] flex items-center justify-center text-white shadow-[0_0_15px_rgba(24,119,242,0.2)]">
                        <i class="fa-brands fa-facebook-f text-base"></i>
                    </div>
                    <div class="text-left">
                        <p class="text-[10px] text-cyan-400 uppercase tracking-widest font-medium">Facebook</p>
                        <p class="text-sm font-medium text-gray-200 mt-0.5">Peak Kitwarit</p>
                    </div>
                </div>
                <i class="fa-solid fa-satellite text-gray-600 group-hover:text-cyan-400 text-sm transition-colors"></i>
            </a>

            <!-- Email (Copy System) -->
            <div onclick="copyText('peak.kitwarit@gmail.com', 'อีเมล')" class="space-btn animate-cosmic d-5 flex items-center justify-between p-4 bg-purple-950/10 border border-purple-500/10 rounded-2xl group">
                <div class="flex items-center space-x-4">
                    <div class="w-11 h-11 rounded-xl bg-cyan-950/40 border border-cyan-500/30 flex items-center justify-center text-cyan-400 shadow-[0_0_15px_rgba(6,182,212,0.2)]">
                        <i class="fa-solid fa-envelope text-base"></i>
                    </div>
                    <div class="text-left">
                        <p class="text-[10px] text-cyan-400 uppercase tracking-widest font-medium">Email</p>
                        <p class="text-sm font-semibold text-gray-200 mt-0.5">peak.kitwarit@gmail.com</p>
                    </div>
                </div>
                <i class="fa-regular fa-copy text-gray-600 group-hover:text-cyan-400 text-sm transition-colors"></i>
            </div>

            <!-- Phone (Copy System) -->
            <div onclick="copyText('0614399978', 'เบอร์โทรศัพท์')" class="space-btn animate-cosmic d-6 flex items-center justify-between p-4 bg-purple-950/10 border border-purple-500/10 rounded-2xl group">
                <div class="flex items-center space-x-4">
                    <div class="w-11 h-11 rounded-xl bg-indigo-950/40 border border-indigo-500/30 flex items-center justify-center text-indigo-400 shadow-[0_0_15px_rgba(99,102,241,0.2)]">
                        <i class="fa-solid fa-phone text-base"></i>
                    </div>
                    <div class="text-left">
                        <p class="text-[10px] text-cyan-400 uppercase tracking-widest font-medium">Phone</p>
                        <p class="text-sm font-semibold text-gray-200 mt-0.5">061-439-9978</p>
                    </div>
                </div>
                <i class="fa-regular fa-copy text-gray-600 group-hover:text-cyan-400 text-sm transition-colors"></i>
            </div>

        </div>

    </div>

    <!-- Toast Notification -->
    <div id="toast">คัดลอกสำเร็จแล้ว 🚀</div>

    <script>
        // ระบบแจ้งเตือนเวลา Copy
        function copyText(textToCopy, typeName) {
            navigator.clipboard.writeText(textToCopy).then(() => {
                const toast = document.getElementById('toast');
                toast.innerText = `${typeName} คัดลอกสำเร็จแล้ว 🚀`;
                toast.classList.add('show');
                setTimeout(() => { toast.classList.remove('show'); }, 2500);
            }).catch(err => console.error('ไม่สามารถคัดลอกได้', err));
        }

        // เอฟเฟกต์ 3D Card
        const card = document.getElementById('card');
        const body = document.querySelector('body');

        body.addEventListener('mousemove', (e) => {
            let xAxis = (window.innerWidth / 2 - e.pageX) / 40;
            let yAxis = (window.innerHeight / 2 - e.pageY) / 40;
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        body.addEventListener('mouseleave', () => {
            card.style.transform = `rotateY(0deg) rotateX(0deg)`;
            card.style.transition = 'transform 0.5s ease';
        });

        body.addEventListener('mouseenter', () => {
            card.style.transition = 'none';
        });
    </script>
    
</body>
</html>
